<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Google by Oliver</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #fff;
}

.logo {
    margin-top: 150px;
    font-size: 60px;
    font-weight: bold;
    color: #4285F4;
}

.logo span:nth-child(2) { color: #EA4335; }
.logo span:nth-child(3) { color: #FBBC05; }
.logo span:nth-child(4) { color: #4285F4; }
.logo span:nth-child(5) { color: #34A853; }
.logo span:nth-child(6) { color: #EA4335; }

.search-box {
    margin-top: 30px;
}

input[type="text"] {
    width: 500px;
    padding: 12px;
    font-size: 18px;
    border: 1px solid #dcdcdc;
    border-radius: 24px;
    outline: none;
}

input[type="submit"] {
    padding: 10px 20px;
    font-size: 16px;
    margin-left: 10px;
    border: none;
    background-color: #f8f9fa;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.3s;
}

input[type="submit"]:hover {
    background-color: #f1f1f1;
}
</style>
</head>
<body>

<div class="logo">
    <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e by Oliver</span>
</div>

<div class="search-box">
    <form action="https://www.google.com/search" method="GET" target="_blank">
        <input type="text" name="q" placeholder="Search Google by Oliver">
        <input type="submit" value="Google Search">
    </form>
</div>

</body>
</html>
